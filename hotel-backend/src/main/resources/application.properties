# Server
server.port=8080
spring.profiles.active=local

# ─── Database: H2 in-memory (demo mode, no PostgreSQL needed) ────────────────
spring.datasource.url=jdbc:h2:mem:hoteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── To use PostgreSQL instead, comment out H2 above and uncomment below: ────
# spring.datasource.url=jdbc:postgresql://localhost:5432/hotel_db
# spring.datasource.username=postgres
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Seed data
spring.sql.init.mode=always

# JWT
jwt.expiration=86400000

# Stripe — replace with your real keys from https://dashboard.stripe.com/apikeys
stripe.secret-key=sk_test_YOUR_SECRET_KEY_HERE
stripe.publishable-key=pk_test_YOUR_PUBLISHABLE_KEY_HERE

# CORS
cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.hotel=INFO
logging.level.org.springframework.security=WARN
