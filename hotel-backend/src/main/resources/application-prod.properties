# PostgreSQL — set DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD in Render dashboard
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.h2.console.enabled=false

# Secrets injected via environment variables
jwt.secret=${JWT_SECRET}
stripe.secret-key=${STRIPE_SECRET_KEY}

# CORS — set to your Vercel URL in Render dashboard
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
